name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'  # 触发条件：推送 v0.1.0 格式的 tag

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 创建 GitHub Release 需要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          cd packages/core && bun run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd packages/core
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Verify npm token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "❌ NPM_TOKEN is empty"
            exit 1
          fi
          echo "✅ NPM_TOKEN is set (length: ${#NODE_AUTH_TOKEN})"
          echo "Token prefix: ${NODE_AUTH_TOKEN:0:4}..."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @hold-baby/bucket-db
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## 📦 Published to npm

            - `@hold-baby/bucket-db@${{ steps.version.outputs.VERSION }}`

            Install:
            ```bash
            bun add @hold-baby/bucket-db
            ```
          draft: false
          prerelease: false
